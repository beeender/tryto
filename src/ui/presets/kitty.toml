# kitty theme preset
# Converted from foot terminal theme

[executable]
fg = "#0d73cc"
bold = true

[argument]
fg = "#cecb00"

[description]
fg = "#dddddd"

[hint]
fg = "#0dcdcd"
italic = true

[header]
fg = "#cb1ed1"
bold = true

[command_line]
fg = "#19cb00"

[step_number]
fg = "#0d73cc"
bold = true

[prompt]
fg = "#0d73cc"
bold = true

[error]
fg = "#cc0403"
bold = true

[warning]
fg = "#cecb00"

[success]
fg = "#19cb00"
