# tango theme preset
# Converted from foot terminal theme

[executable]
fg = "#3465a4"
bold = true

[argument]
fg = "#c4a000"

[description]
fg = "#babdb6"

[hint]
fg = "#06989a"
italic = true

[header]
fg = "#75507b"
bold = true

[command_line]
fg = "#4e9a06"

[step_number]
fg = "#3465a4"
bold = true

[prompt]
fg = "#3465a4"
bold = true

[error]
fg = "#cc0000"
bold = true

[warning]
fg = "#c4a000"

[success]
fg = "#4e9a06"
