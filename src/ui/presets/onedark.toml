# onedark theme preset
# Converted from foot terminal theme

[executable]
fg = "#61afef"
bold = true

[argument]
fg = "#e5c07b"

[description]
fg = "#979eab"

[hint]
fg = "#56b6c2"
italic = true

[header]
fg = "#be5046"
bold = true

[command_line]
fg = "#98c379"

[step_number]
fg = "#61afef"
bold = true

[prompt]
fg = "#61afef"
bold = true

[error]
fg = "#e06c75"
bold = true

[warning]
fg = "#e5c07b"

[success]
fg = "#98c379"
