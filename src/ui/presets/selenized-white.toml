# selenized-white theme preset
# Converted from foot terminal theme

[executable]
fg = "#0064e4"
bold = true

[argument]
fg = "#c49700"

[description]
fg = "#474747"

[hint]
fg = "#00ad9c"
italic = true

[header]
fg = "#dd0f9d"
bold = true

[command_line]
fg = "#1d9700"

[step_number]
fg = "#0064e4"
