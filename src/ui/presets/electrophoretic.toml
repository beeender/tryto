# electrophoretic theme preset
# Converted from foot terminal theme

[executable]
fg = "#616161"
bold = true

[argument]
fg = "#111111"

[description]
fg = "#000000"

[hint]
fg = "#212121"
italic = true

[header]
fg = "#414141"
bold = true

[command_line]
fg = "#313131"

[step_number]
fg = "#616161"
bold = true

[prompt]
fg = "#616161"
bold = true

[error]
fg = "#515151"
bold = true

[warning]
fg = "#111111"

[success]
fg = "#313131"
