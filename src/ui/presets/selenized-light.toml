# selenized-light theme preset
# Converted from foot terminal theme

[executable]
fg = "#0072d4"
bold = true

[argument]
fg = "#ad8900"

[description]
fg = "#53676d"

[hint]
fg = "#009c8f"
italic = true

[header]
fg = "#ca4898"
bold = true

[command_line]
fg = "#489100"

[step_number]
fg = "#0072d4"
